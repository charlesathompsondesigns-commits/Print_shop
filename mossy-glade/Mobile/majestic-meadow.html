<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>
  /* Responsive scene routing — bounce back to the desktop scene above the mobile breakpoint. */
  (function () {
    var DESKTOP = '(min-width: 768px)';
    function crossfade(url) {
      var o = document.createElement('div');
      o.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#c8cfc1;opacity:0;transition:opacity .45s ease;pointer-events:none';
      (document.body || document.documentElement).appendChild(o);
      requestAnimationFrame(function () { o.style.opacity = '1'; });
      setTimeout(function () { location.replace(url); }, 460);
    }
    if (window.matchMedia(DESKTOP).matches) { location.replace('../index.html'); return; }
    var mql = window.matchMedia(DESKTOP);
    var onChange = function (e) { if (e.matches) crossfade('../index.html'); };
    mql.addEventListener ? mql.addEventListener('change', onChange) : mql.addListener(onChange);
  })();
</script>
<title>Majestic Meadow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #2a4a1a;
    font-family: 'Inter', -apple-system, sans-serif;
    cursor: none;
  }
  canvas {
    display: block;
    touch-action: none;
  }
  #info {
    position: fixed;
    top: 24px;
    left: 24px;
    color: rgba(255,255,255,0.95);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
    font-weight: 400;
    text-shadow: 0 1px 8px rgba(0,0,0,0.7);
  }
  #info span {
    display: block;
    font-size: 9px;
    letter-spacing: 0.16em;
    opacity: 0.8;
    margin-top: 5px;
    font-style: italic;
    font-weight: 300;
  }
  #cursor {
    position: fixed;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    background: radial-gradient(
      circle,
      rgba(255, 250, 220, 0.2) 0%,
      rgba(255, 240, 180, 0.08) 50%,
      transparent 75%
    );
    mix-blend-mode: screen;
  }
  #cursor::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    background: rgba(255, 255, 240, 1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px rgba(255, 245, 200, 0.95), 0 0 24px rgba(255, 230, 150, 0.7);
  }
</style>
</head>
<body>
<div id="info">Majestic meadow<span>watch the wind roll through, drift your cursor in the grass</span></div>
<div id="cursor"></div>

<!-- Product detail panel — slides in from the right when a card is clicked -->
<div id="product-panel">
  <button id="product-close" aria-label="Close">×</button>
  <div id="product-content">
    <p id="product-subtitle"></p>
    <h2 id="product-title"></h2>
    <p id="product-description"></p>
    <div class="product-specs">
      <div class="spec-row"><span class="spec-label">Paper</span><span class="spec-value" id="product-paper"></span></div>
      <div class="spec-row"><span class="spec-label">Size</span><span class="spec-value" id="product-size"></span></div>
      <div class="spec-row"><span class="spec-label">Edition</span><span class="spec-value" id="product-edition"></span></div>
      <div class="spec-row price"><span class="spec-label">Price</span><span class="spec-value" id="product-price"></span></div>
    </div>
    <button id="add-to-cart">Add to cart</button>
  </div>
</div>

<style>
  #product-panel {
    position: fixed;
    background: rgba(20, 18, 14, 0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    color: rgba(255, 250, 240, 0.95);
    z-index: 200;
    box-sizing: border-box;
    overflow-y: auto;
    transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  /* Desktop: side panel from the right */
  @media (min-width: 768px) {
    #product-panel {
      top: 0;
      right: 0;
      width: 380px;
      height: 100vh;
      padding: 80px 40px 40px;
      border-left: 1px solid rgba(255, 240, 200, 0.1);
      transform: translateX(100%);
    }
    #product-panel.active { transform: translateX(0); }
  }

  /* Mobile: bottom sheet, card stays visible above */
  @media (max-width: 767px) {
    #product-panel {
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 48vh;
      padding: 28px 24px 24px;
      border-top: 1px solid rgba(255, 240, 200, 0.1);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
    }
    #product-panel.active { transform: translateY(0); }
    #product-title { font-size: 22px; margin-bottom: 16px; }
    #product-description { margin-bottom: 24px; font-size: 13px; }
    .product-specs { margin-bottom: 24px; }
    .spec-row { padding: 12px 0; }
    #add-to-cart { padding: 14px; }
  }
  #product-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    background: rgba(255, 250, 230, 0.1);
    border: 1px solid rgba(255, 250, 230, 0.2);
    color: rgba(255, 250, 230, 0.9);
    font-size: 24px;
    line-height: 1;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
  }
  #product-close:hover { background: rgba(255, 250, 230, 0.2); }
  #product-subtitle {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.6;
    margin: 0 0 8px;
    font-weight: 400;
  }
  #product-title {
    font-size: 28px;
    font-weight: 300;
    margin: 0 0 24px;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  #product-description {
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.8;
    margin: 0 0 40px;
    font-weight: 300;
  }
  .product-specs {
    border-top: 1px solid rgba(255, 240, 200, 0.12);
    margin-bottom: 40px;
  }
  .spec-row {
    display: flex;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255, 240, 200, 0.08);
    font-size: 13px;
  }
  .spec-label {
    opacity: 0.55;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
  }
  .spec-value {
    opacity: 0.95;
    font-weight: 300;
  }
  .spec-row.price .spec-value {
    font-size: 18px;
    font-weight: 400;
  }
  #add-to-cart {
    width: 100%;
    padding: 18px;
    background: rgba(255, 240, 200, 0.95);
    color: #1a1610;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
  }
  #add-to-cart:hover { background: rgba(255, 250, 230, 1); }
  #add-to-cart:active { transform: scale(0.98); }
  #add-to-cart.added {
    background: rgba(160, 200, 140, 0.95);
    color: #1a1610;
  }
</style>

      s += texture2D(uTex, vUv + o * 1.0) * 0.1514;
      s += texture2D(uTex, vUv + o * 2.0) * 0.1216;
      s += texture2D(uTex, vUv + o * 3.0) * 0.0918;
      s += texture2D(uTex, vUv + o * 4.0) * 0.051;
      gl_FragColor = s;

  depthTest: false, depthWrite: false, toneMapped: false,
});
const blurMesh = new THREE.Mesh(quadGeo, blurMat);

// Composite: draws the blurred background to screen with a subtle vignette/darken

  uniforms: {
    uTex: { value: null },

      float vig = mix(1.0, smoothstep(1.05, 0.25, d), uFocus * 0.7);

function resizeRTs() {
  const pr = renderer.getPixelRatio();
  const w = Math.max(1, Math.floor(innerWidth * pr));
  const h = Math.max(1, Math.floor(innerHeight * pr));
  sceneRT.setSize(w, h);
  // Blur passes run at half-res for performance — the blur hides the resolution loss.
  blurRTa.setSize(Math.max(1, Math.floor(w * 0.5)), Math.max(1, Math.floor(h * 0.5)));
  blurRTb.setSize(blurRTa.width, blurRTa.height);
}

// ---------- Subtle terrain bumps ----------
function terrainHeight(x, z) {
  return Math.sin(x * 0.25) * Math.cos(z * 0.3) * 0.15 + Math.sin(x * 0.5) * 0.05;
}
function terrainNormal(x, z) {
  const e = 0.1;
  const dx = terrainHeight(x + e, z) - terrainHeight(x - e, z);
  const dz = terrainHeight(x, z + e) - terrainHeight(x, z - e);
  return new THREE.Vector3(-dx, 2 * e, -dz).normalize();
}

// A stream winding down the middle of the meadow.
const STREAM_HALF = 1.35;
function streamX(z) { return Math.sin(z * 0.3) * 1.45 + Math.sin(z * 0.11 + 1.0) * 0.5; }

const GROUND_SIZE = 40;
const groundGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, 120, 120);

const groundMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uFogColor: { value: new THREE.Color(0xbcc6bb) },
    uFogDensity: { value: 0.04 }
  },
  vertexShader: `
    varying vec3 vWorld;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    varying vec3 vWorld;
    uniform float uTime;
    uniform vec3 uFogColor;
    uniform float uFogDensity;
    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      vec2 u = f*f*(3.0-2.0*f);
      return mix(mix(hash(i), hash(i+vec2(1,0)), u.x),
                 mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
    }
    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
      return v;
    }
    void main() {
      // The floor is itself a carpet of fine grass — never bare earth.
      // Painted in the same palette as the blades so any gap between
      // tufts reads as undergrowth, not a patch.
      vec3 deepGreen = vec3(0.10, 0.16, 0.095);
      vec3 midGreen  = vec3(0.165, 0.255, 0.155);
      vec3 liteGreen = vec3(0.26, 0.35, 0.22);

      // Three scales of texture: broad swathes, tufty mottling,
      // and a fine blade-like grain
      float broad = fbm(vWorld.xz * 0.5);
      float tufts = noise(vWorld.xz * 3.5);
      float grain = noise(vWorld.xz * vec2(22.0, 9.0))
                  * noise(vWorld.xz * vec2(8.0, 26.0));

      vec3 col = mix(deepGreen, midGreen, broad);
      col = mix(col, liteGreen, tufts * 0.45);
      col *= 0.85 + grain * 0.45;

      // Same drifting god-ray pools as the blades, so light agrees
      vec2 lightUv = vWorld.xz * 0.18 + vec2(uTime * 0.04, uTime * 0.02);
      float godRay = fbm(lightUv);
      godRay = pow(smoothstep(0.4, 0.85, godRay), 1.4);
      col = mix(col, col * vec3(0.86, 0.90, 0.85) * 1.2, godRay * 0.28);

      float depth = gl_FragCoord.z / gl_FragCoord.w;
      float fog = 1.0 - exp(-uFogDensity * depth);
      col = mix(col, uFogColor, fog);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
scene.add(new THREE.Mesh(groundGeo, groundMat));

// ---------- Winding stream (cool, flowing water) ----------
const waterMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: { uTime: { value: 0 }, uFogColor: { value: new THREE.Color(0xbcc6bb) }, uFogDensity: { value: 0.058 } },
  vertexShader: `

    void main(){ vUv = uv; vec4 wp = modelMatrix * vec4(position, 1.0); vWorldPos = wp.xyz; gl_Position = projectionMatrix * viewMatrix * wp; }
  `,
  fragmentShader: `
    varying vec2 vUv; varying vec3 vWorldPos;
    uniform float uTime; uniform vec3 uFogColor; uniform float uFogDensity;

    float n(vec2 p){ vec2 i=floor(p), f=fract(p); vec2 u=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),u.x), mix(h(i+vec2(0,1)),h(i+vec2(1,1)),u.x), u.y); }

    void main(){

      vec3 deep = vec3(0.055, 0.125, 0.115);
      vec3 mid  = vec3(0.155, 0.265, 0.235);

      vec3 col = mix(deep, mid, r1);

      float sp = pow(n(vec2(vUv.x * 30.0, flow * 3.0)), 22.0);   // sparkle
      col += vec3(0.9) * sp * 0.4;
      float bank = 1.0 - smoothstep(0.05, 0.22, min(vUv.x, 1.0 - vUv.x));   // foam at the banks
      col = mix(col, vec3(0.82, 0.88, 0.84), clamp(bank * (0.4 + r2 * 0.5), 0.0, 1.0) * 0.5);
      float depth = length(vWorldPos - cameraPosition);
      float fog = 1.0 - exp(-uFogDensity * depth);

{
  const wv = [], wuv = [], wi = [];
  const Z0 = -20, Z1 = 20, STEPS = 130, HALF = STREAM_HALF * 0.96;
  for (let i = 0; i <= STEPS; i++) {
    const z = Z0 + (Z1 - Z0) * (i / STEPS);
    const cx = streamX(z);
    wv.push(cx - HALF, 0, z, cx + HALF, 0, z);
    wuv.push(0, i / STEPS, 1, i / STEPS);
  }
  for (let i = 0; i < STEPS; i++) { const k = i * 2; wi.push(k, k + 2, k + 1, k + 1, k + 2, k + 3); }
  const wgeo = new THREE.BufferGeometry();

  wgeo.setAttribute('uv', new THREE.Float32BufferAttribute(wuv, 2));

  const waterMesh = new THREE.Mesh(wgeo, waterMat);
  waterMesh.position.y = terrainHeight(0, 0) - 0.05;   // sits just below the grass base

// ---------- Blade geometry — hair-thin with curved natural taper ----------
const SEGMENTS = 6;   // fewer height segments per blade — lighter geometry for mobile
const BLADE_HEIGHT = 0.55;
const BLADE_WIDTH = 0.016;

function makeBladeGeometry() {
  const geo = new THREE.BufferGeometry();
  const positions = [], uvs = [], indices = [];
  for (let i = 0; i <= SEGMENTS; i++) {
    const v = i / SEGMENTS;
    // Curved taper: narrow base, gentle widening, then a long draw to a needle point
    let w;
    if (v < 0.12) {
      w = BLADE_WIDTH * (0.45 + v * 4.6);
    } else {
      w = BLADE_WIDTH * Math.pow(1.0 - (v - 0.12) / 0.88, 1.7);
    }
    const y = v * BLADE_HEIGHT;
    positions.push(-w, y, 0,  w, y, 0);
    uvs.push(0, v,  1, v);
  }
  for (let i = 0; i < SEGMENTS; i++) {
    const a = i * 2;
    indices.push(a, a+1, a+2,  a+1, a+3, a+2);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  return geo;
}
const bladeGeo = makeBladeGeometry();

// ---------- Instanced grass — clumped growth like a real meadow ----------
// Real grass grows in tufts. ~75% of blades cluster around shared clump
// centers, inheriting the clump's lean direction and species tendency,
// with loose strays filling the gaps between tufts.
const COUNT = 160000;   // mobile-tuned blade count (was 780k — far too heavy for phones)
const FIELD = 14;
const CLUMP_COUNT = 16000;

const clumpCenters = new Float32Array(CLUMP_COUNT * 2);
const clumpLean = new Float32Array(CLUMP_COUNT * 2);
const clumpSpecies = new Float32Array(CLUMP_COUNT);
for (let c = 0; c < CLUMP_COUNT; c++) {
  clumpCenters[c*2+0] = (Math.random() - 0.5) * FIELD * 2;
  clumpCenters[c*2+1] = (Math.random() - 0.5) * FIELD * 2;
  const leanAng = Math.random() * Math.PI * 2;
  const leanStr = 0.08 + Math.random() * 0.28;
  clumpLean[c*2+0] = Math.cos(leanAng) * leanStr;
  clumpLean[c*2+1] = Math.sin(leanAng) * leanStr;
  clumpSpecies[c] = Math.random();
}

const offsets = new Float32Array(COUNT * 3);
const rotations = new Float32Array(COUNT);
const scales = new Float32Array(COUNT);
const variation = new Float32Array(COUNT);
const tiltDir = new Float32Array(COUNT * 2);
const normals = new Float32Array(COUNT * 3);
const lengthVar = new Float32Array(COUNT); // independent height variation
const twists = new Float32Array(COUNT);    // per-blade spiral along height

// Gaussian-ish offset around a clump center
function clumpOffset() {
  const a = Math.random() * Math.PI * 2;
  const r = (Math.random() + Math.random()) * 0.5 * 0.62; // triangular falloff
  return [Math.cos(a) * r, Math.sin(a) * r];
}

for (let i = 0; i < COUNT; i++) {
  let x, z, lx = 0, lz = 0, speciesBias = Math.random();
  if (Math.random() < 0.5) {
    const c = (Math.random() * CLUMP_COUNT) | 0;
    const [ox, oz] = clumpOffset();
    x = clumpCenters[c*2+0] + ox;
    z = clumpCenters[c*2+1] + oz;
    // Clump members share lean and drift toward the clump's species
    lx = clumpLean[c*2+0];
    lz = clumpLean[c*2+1];
    speciesBias = clumpSpecies[c] * 0.7 + speciesBias * 0.3;
  } else {
    x = (Math.random() - 0.5) * FIELD * 2;
    z = (Math.random() - 0.5) * FIELD * 2;
  }
  // keep grass out of the stream channel — push any blade onto the bank
  const sdx = x - streamX(z);
  if (Math.abs(sdx) < STREAM_HALF) {
    x = streamX(z) + (sdx < 0 ? -1 : 1) * (STREAM_HALF + Math.random() * 0.5);
  }
  const y = terrainHeight(x, z);
  offsets[i*3+0] = x;
  offsets[i*3+1] = y;
  offsets[i*3+2] = z;
  const n = terrainNormal(x, z);
  normals[i*3+0] = n.x;
  normals[i*3+1] = n.y;
  normals[i*3+2] = n.z;
  rotations[i] = Math.random() * Math.PI * 2;
  // Wide scale range — short undergrowth beside tall stems
  scales[i] = 0.65 + Math.random() * 1.0;
  variation[i] = speciesBias;
  // Some blades grow taller (long-stemmed seed heads)
  lengthVar[i] = Math.random() < 0.14 ? 1.0 + Math.random() * 0.85 : 1.0;
  // Lean: clump lean + a personal touch of chaos
  const tilt = Math.random() * Math.PI * 2;
  const tiltStrength = 0.05 + Math.random() * 0.18;
  tiltDir[i*2+0] = lx + Math.cos(tilt) * tiltStrength;
  tiltDir[i*2+1] = lz + Math.sin(tilt) * tiltStrength;
  // Gentle spiral so each blade catches light differently along its length
  twists[i] = (Math.random() - 0.5) * 2.4;
}

const instGeo = new THREE.InstancedBufferGeometry();
instGeo.index = bladeGeo.index;
instGeo.setAttribute('position', bladeGeo.getAttribute('position'));
instGeo.setAttribute('uv', bladeGeo.getAttribute('uv'));
instGeo.setAttribute('aOffset',    new THREE.InstancedBufferAttribute(offsets, 3));
instGeo.setAttribute('aRotation',  new THREE.InstancedBufferAttribute(rotations, 1));
instGeo.setAttribute('aScale',     new THREE.InstancedBufferAttribute(scales, 1));
instGeo.setAttribute('aVariation', new THREE.InstancedBufferAttribute(variation, 1));
instGeo.setAttribute('aTilt',      new THREE.InstancedBufferAttribute(tiltDir, 2));
instGeo.setAttribute('aGroundN',   new THREE.InstancedBufferAttribute(normals, 3));
instGeo.setAttribute('aLength',    new THREE.InstancedBufferAttribute(lengthVar, 1));
instGeo.setAttribute('aTwist',     new THREE.InstancedBufferAttribute(twists, 1));

// ---------- Grass shaders (cinematic sunlit meadow) ----------
const grassVert = /* glsl */ `
  uniform float uTime;
  uniform vec3 uMouse;
  uniform vec2 uMouseVel;
  uniform float uMouseStrength;
  uniform vec3 uRipplePos;
  uniform float uRippleTime;
  uniform vec4 uCards[4];
  uniform float uCardRotations[4];

  attribute vec3 aOffset;
  attribute float aRotation;
  attribute float aScale;
  attribute float aVariation;
  attribute vec2 aTilt;
  attribute vec3 aGroundN;
  attribute float aLength;
  attribute float aTwist;

  varying vec2 vUv;
  varying float vVariation;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec3 vRight;
  varying float vCurve;
  varying float vMagicGlow;
  varying float vGust;
  varying float vHeight;
  varying float vPressed;

  float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x),
               mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
  }
  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 3; i++) { v += a * noise(p); p *= 2.1; a *= 0.5; }
    return v;
  }
  mat2 rot(float a) { float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }
  mat3 alignToNormal(vec3 N) {
    vec3 up = vec3(0.0, 1.0, 0.0);
    vec3 axis = cross(up, N);
    float ang = acos(clamp(dot(up, N), -1.0, 1.0));
    float c = cos(ang), s = sin(ang);
    float t = 1.0 - c;
    vec3 a = normalize(axis + vec3(0.0001));
    return mat3(
      t*a.x*a.x + c,      t*a.x*a.y - s*a.z, t*a.x*a.z + s*a.y,
      t*a.x*a.y + s*a.z,  t*a.y*a.y + c,     t*a.y*a.z - s*a.x,
      t*a.x*a.z - s*a.y,  t*a.y*a.z + s*a.x, t*a.z*a.z + c
    );
  }

  void main() {
    vUv = uv;
    vVariation = aVariation;

    // ===== Card clearance =====
    // Blades rooted under a card collapse fully. Blades near an edge live in
    // a soft margin: they shrink, lose their wind, and lean away from the
    // card so no bent tip can ever cross over the print.
    float cardCover = 0.0;
    float cardEdge = 0.0;
    vec2 awayDir = vec2(0.0);
    vec2 pressDir = vec2(1.0, 0.0);
    for (int i = 0; i < 4; i++) {
      vec4 c = uCards[i];
      vec2 delta = aOffset.xz - c.xy;
      float ang = uCardRotations[i];
      float cs = cos(-ang), sn = sin(-ang);
      vec2 local = vec2(delta.x * cs - delta.y * sn, delta.x * sn + delta.y * cs);
      vec2 absLocal = abs(local);
      // Distance beyond the card footprint (0 when rooted underneath)
      vec2 over = max(absLocal - vec2(c.z * 1.05, c.w * 1.05), vec2(0.0));
      float outside = length(over);
      if (outside < 0.001) {
        cardCover = 1.0;
        pressDir = normalize(delta + vec2(0.0001));
      }
      float prox = 1.0 - smoothstep(0.0, 0.28, outside);
      if (prox > cardEdge) {
        cardEdge = prox;
        awayDir = normalize(delta + vec2(0.0001));
      }
    }
    float edgeDamp = (1.0 - cardEdge * 0.75) * (1.0 - cardCover);

    float t = uv.y;
    vHeight = t;

    // Per-vertex twist: the blade spirals gently along its height,
    // so highlights travel and glint as the camera and sun interact.
    float twistAng = aRotation + aTwist * t * 0.6;
    float clearScale = mix(mix(1.0, 0.62, cardEdge), 0.88, cardCover);
    vec3 pos = position * aScale * clearScale;
    pos.y *= aLength;
    pos.xz = rot(twistAng) * pos.xz;

    // Natural arc: blades bend along their lean like a drawn bow,
    // tips dipping as the curve deepens (length is roughly preserved)
    float curve = pow(t, 1.6);
    float leanMag = length(aTilt) * edgeDamp;
    pos.x += aTilt.x * edgeDamp * curve * aScale;
    pos.z += aTilt.y * edgeDamp * curve * aScale;
    pos.y -= leanMag * leanMag * curve * curve * aScale * 0.6;

    mat3 align = alignToNormal(normalize(aGroundN));
    pos = align * pos;

    // Flattened mat beneath a card — blades lie down in a swirled whorl,
    // pushed outward from the card center, just under the print
    if (cardCover > 0.5) {
      vec2 swirl = normalize(pressDir + vec2(cos(aRotation), sin(aRotation)) * 0.65);
      vec3 pressed = vec3(swirl.x, 0.0, swirl.y) * (pos.y * 0.8)
                   + vec3(pos.x, 0.0, pos.z);
      pressed.y = 0.025 + t * 0.09 * aScale;
      pos = pressed;
    }
    vec3 worldPos = pos + aOffset;

    // ===== Layered wind =====
    vec2 windDir = normalize(vec2(0.74, 0.32));
    float phase = dot(aOffset.xz, windDir);

    // 1. Gust fronts — broad waves of pressure rolling across the meadow
    float front = fbm(aOffset.xz * 0.07 - windDir * uTime * 0.55);
    front = smoothstep(0.32, 0.92, front);
    float swell = sin(phase * 0.45 - uTime * 1.5) * 0.5 + 0.5;
    float gust = front * (0.55 + swell * 0.45);

    // 2. Ambient sway — every blade breathes at its own rhythm
    float sway = sin(uTime * 1.25 + aVariation * 6.2831 + phase * 0.7) * 0.16;

    // 3. Tip flutter — fine chaos, amplified inside a gust
    float flutter = (noise(aOffset.xz * 1.4 + uTime * 2.1) - 0.5) * 0.3 * (0.35 + gust);

    float bendWind = (gust * 0.6 + sway + flutter) * edgeDamp;
    worldPos.x += windDir.x * bendWind * curve * 0.38;
    worldPos.z += windDir.y * bendWind * curve * 0.38;
    worldPos.y -= abs(bendWind) * curve * curve * 0.07;
    vGust = gust;

    // Lean away from a nearby card so tips clear the print
    worldPos.x += awayDir.x * cardEdge * curve * 0.22;
    worldPos.z += awayDir.y * cardEdge * curve * 0.22;

    // Cursor is a LIGHT BRUSH — only the tips sway in the drag direction,
    // over a tight radius, bounded so a fast drag never yanks the field.
    vec2 toMouse = worldPos.xz - uMouse.xz;
    float dist = length(toMouse);
    float velMag = length(uMouseVel);
    float velGate = smoothstep(0.0, 0.25, velMag);
    float falloff = exp(-dist * dist * 2.8);                 // tighter brush footprint
    float windInfluence = falloff * uMouseStrength * velGate * edgeDamp;
    vec2 brushDir = uMouseVel / (velMag + 0.0001);
    vec2 windPush = brushDir * min(velMag, 1.2) * 0.05;      // bounded & gentle (was raw vel * 0.08)
    float tipMask = smoothstep(0.4, 1.0, t);
    worldPos.x += windPush.x * windInfluence * tipMask;
    worldPos.z += windPush.y * windInfluence * tipMask;
    float influence = windInfluence;

    // Ripple
    vec2 toRipple = worldPos.xz - uRipplePos.xz;
    float rippleDist = length(toRipple);
    float rippleRadius = uRippleTime * 4.0;
    float rippleBand = exp(-pow(rippleDist - rippleRadius, 2.0) * 4.0);
    float rippleFade = exp(-uRippleTime * 0.8);
    float ripple = rippleBand * rippleFade * edgeDamp;
    vec2 rippleDir = normalize(toRipple + 0.0001);
    worldPos.x += rippleDir.x * ripple * curve * 0.5;
    worldPos.z += rippleDir.y * ripple * curve * 0.5;
    worldPos.y += ripple * curve * 0.3;

    vMagicGlow = max(influence * smoothstep(0.0, 1.0, t), ripple * 1.5) * 0.5;
    vPressed = cardCover;
    vCurve = curve;
    vWorldPos = worldPos;

    // Face normal + right vector at this height (twist-aware) so the
    // fragment shader can wrap a rounded, cylinder-like normal across the blade
    vNormal = normalize(align * vec3(sin(twistAng), 0.3, cos(twistAng)));
    vRight  = normalize(align * vec3(cos(twistAng), 0.0, -sin(twistAng)));
    gl_Position = projectionMatrix * modelViewMatrix * vec4(worldPos, 1.0);
  }
`;

const grassFrag = /* glsl */ `
  precision highp float;
  varying vec2 vUv;
  varying float vVariation;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec3 vRight;
  varying float vCurve;
  varying float vMagicGlow;
  varying float vGust;
  varying float vHeight;
  varying float vPressed;

  uniform float uTime;
  uniform vec3 uSunDir;
  uniform vec3 uSunColor;
  uniform vec3 uSkyColor;
  uniform vec3 uFogColor;
  uniform float uFogDensity;

  float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x),
               mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
  }
  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
    return v;
  }

  void main() {
    // ===== Base meadow palette — deep roots to sun-warmed tips =====
    vec3 colRoot = vec3(0.075, 0.135, 0.075);
    vec3 colMid  = vec3(0.165, 0.275, 0.165);
    vec3 colHigh = vec3(0.30, 0.42, 0.27);
    vec3 colTip  = vec3(0.46, 0.56, 0.39);

    vec3 col = mix(colRoot, colMid, smoothstep(0.0, 0.35, vUv.y));
    col = mix(col, colHigh, smoothstep(0.35, 0.7, vUv.y));
    col = mix(col, colTip, smoothstep(0.7, 1.0, vUv.y));

    // ===== Species — three blade types living side by side =====
    float species = vVariation;
    float dryness = 0.0;
    if (species < 0.3) {
      // Cool sage-green fescue
      col = mix(col, col * vec3(0.82, 1.0, 0.96), 0.25);
    } else if (species > 0.78) {
      // pale, muted — no golden cast in the mist
      col = mix(col, col * vec3(0.94, 1.0, 0.88), 0.22);
      dryness = smoothstep(0.78, 1.0, species);
    }
    // Gentle brightness variation — low contrast keeps the field plush
    col *= 0.85 + vVariation * 0.3;

    // Dried straw tips on the older blades
    vec3 straw = vec3(0.52, 0.55, 0.42);
    col = mix(col, straw, dryness * smoothstep(0.85, 1.0, vUv.y) * 0.5);

    // Patch-level color drift across the meadow — cool damp swathes
    float patchHue = fbm(vWorldPos.xz * 0.35);
    col = mix(col, col * vec3(0.92, 0.98, 0.94), patchHue * 0.34);

    // Center vein + fine longitudinal striations like a real blade surface
    float centerLine = 1.0 - smoothstep(0.0, 0.15, abs(vUv.x - 0.5));
    col *= 1.0 - centerLine * 0.16 * smoothstep(0.2, 1.0, vUv.y);
    float striate = noise(vec2(vUv.x * 24.0 + vVariation * 90.0, vUv.y * 3.0));
    col *= 0.94 + striate * 0.12;

    // ===== Animated god-ray pools =====
    vec2 lightUv = vWorldPos.xz * 0.18 + vec2(uTime * 0.04, uTime * 0.02);
    float godRay = fbm(lightUv);
    godRay = pow(smoothstep(0.4, 0.85, godRay), 1.4);

    // soft cool light clearings drifting through the mist (no golden pools)
    vec3 mistLight = vec3(0.86, 0.90, 0.85);
    col = mix(col, col * mistLight * 1.25, godRay * smoothstep(0.3, 1.0, vUv.y) * 0.30);
    col += mistLight * godRay * smoothstep(0.7, 1.0, vUv.y) * 0.12;

    // Deep ambient occlusion at the roots — the meadow floor swallows light
    float ao = mix(0.48, 1.0, smoothstep(0.0, 0.45, vUv.y));
    col *= ao;

    // ===== Lighting =====
    // Rounded normal: wrap the flat ribbon into a cylinder so each blade
    // carries a soft highlight that rolls across its face
    float side = vUv.x * 2.0 - 1.0;
    vec3 N = normalize(vNormal + vRight * side * 0.85);
    if (!gl_FrontFacing) N = -N;
    vec3 L = normalize(uSunDir);
    vec3 V = normalize(cameraPosition - vWorldPos);

    float NdotL = dot(N, L);
    float wrap = max((NdotL + 0.6) / 1.6, 0.0);
    vec3 ambient = uSkyColor * 0.62;

    // Translucency — sun bleeding through the blade when backlit
    float back = pow(max(dot(-L, V), 0.0), 2.5);
    vec3 sssTint = mix(vec3(0.66, 0.80, 0.70), vec3(0.78, 0.82, 0.70), dryness);
    vec3 sss = sssTint * back * vCurve * (0.7 + godRay * 0.4);

    // Anisotropic glint — a tight streak broken up by micro-serrations
    vec3 H = normalize(L + V);
    float specBreakup = 0.6 + 0.4 * noise(vec2(vVariation * 120.0, vUv.y * 9.0 - uTime * 0.4));
    float spec = pow(max(dot(N, H), 0.0), 36.0) * smoothstep(0.45, 1.0, vUv.y) * specBreakup;

    // Fresnel rim — silvery sheen at grazing angles, surging when a gust
    // front bends the blades into the light (waves of light roll the field)
    float fresnel = pow(1.0 - max(dot(N, V), 0.0), 3.0);
    vec3 sheen = mix(uSkyColor, uSunColor, 0.6) * fresnel
               * smoothstep(0.4, 1.0, vUv.y) * (0.18 + vGust * 0.6);

    vec3 lit = col * (ambient + uSunColor * wrap * (0.7 + godRay * 1.35))
             + sss
             + spec * uSunColor * 0.3
             + sheen;

    // Gusts also catch a faint warm lift in the body color
    lit += col * uSunColor * vGust * smoothstep(0.5, 1.0, vUv.y) * 0.35;

    // Mat beneath a card sits in its soft shadow — cooler and dimmer
    lit *= 1.0 - vPressed * 0.32;
    lit = mix(lit, lit * vec3(0.85, 0.95, 0.9), vPressed * 0.4);

    vec3 magicColor = vec3(0.72, 0.86, 0.80);
    lit += magicColor * vMagicGlow * 0.4;

    // Aerial perspective — distant blades soften toward the meadow's
    // average tone before the fog takes over, killing far shimmer
    float depth = gl_FragCoord.z / gl_FragCoord.w;
    vec3 meadowAvg = vec3(0.27, 0.34, 0.27) * (0.85 + godRay * 0.5);
    float distSoften = 1.0 - exp(-depth * 0.055);
    lit = mix(lit, meadowAvg, distSoften * 0.55);

    float fog = 1.0 - exp(-uFogDensity * depth);
    lit = mix(lit, uFogColor, fog);

    gl_FragColor = vec4(lit, 1.0);
  }
`;

// ---------- Daisy clusters (scattered in patches like the reference) ----------
// Daisy = textured quad facing up, painted procedurally in shader
const DAISY_COUNT = 1400;
const daisyOffsets = new Float32Array(DAISY_COUNT * 3);
const daisyScales = new Float32Array(DAISY_COUNT);
const daisyRot = new Float32Array(DAISY_COUNT);

// Generate clusters: pick random cluster centers, then spawn daisies around each
const CLUSTERS = 30;
const clusterCenters = [];
for (let c = 0; c < CLUSTERS; c++) {
  clusterCenters.push({
    x: (Math.random() - 0.5) * FIELD * 1.8,
    z: (Math.random() - 0.5) * FIELD * 1.8,
    radius: 1.0 + Math.random() * 2.5,
    density: 0.4 + Math.random() * 0.6
  });
}

let daisyIdx = 0;
while (daisyIdx < DAISY_COUNT) {
  const cluster = clusterCenters[Math.floor(Math.random() * CLUSTERS)];
  if (Math.random() > cluster.density) continue;
  // Position within cluster (gaussian-ish)
  const r = Math.pow(Math.random(), 0.6) * cluster.radius;
  const theta = Math.random() * Math.PI * 2;
  const x = cluster.x + Math.cos(theta) * r;
  const z = cluster.z + Math.sin(theta) * r;
  if (Math.abs(x) > FIELD || Math.abs(z) > FIELD) continue;
  const y = terrainHeight(x, z) + 0.25 + Math.random() * 0.2;
  daisyOffsets[daisyIdx*3+0] = x;
  daisyOffsets[daisyIdx*3+1] = y;
  daisyOffsets[daisyIdx*3+2] = z;
  daisyScales[daisyIdx] = 0.7 + Math.random() * 0.6;
  daisyRot[daisyIdx] = Math.random() * Math.PI * 2;
  daisyIdx++;
}

// Daisy quad geometry
const daisyQuadGeo = new THREE.PlaneGeometry(0.2, 0.2);
daisyQuadGeo.rotateX(-Math.PI / 2); // face up

const daisyInstGeo = new THREE.InstancedBufferGeometry();
daisyInstGeo.index = daisyQuadGeo.index;
daisyInstGeo.setAttribute('position', daisyQuadGeo.attributes.position);
daisyInstGeo.setAttribute('uv', daisyQuadGeo.attributes.uv);
daisyInstGeo.setAttribute('aOffset', new THREE.InstancedBufferAttribute(daisyOffsets, 3));
daisyInstGeo.setAttribute('aScale',  new THREE.InstancedBufferAttribute(daisyScales, 1));
daisyInstGeo.setAttribute('aRot',    new THREE.InstancedBufferAttribute(daisyRot, 1));

const daisyMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: true,
  uniforms: {
    uTime:  { value: 0 },
    uMouse: { value: new THREE.Vector3(999, 0, 999) },
    uMouseVel: { value: new THREE.Vector2(0, 0) },
    uMouseStrength: { value: 0 },
    uCards: { value: [
      new THREE.Vector4(999, 999, 0, 0),
      new THREE.Vector4(999, 999, 0, 0),
      new THREE.Vector4(999, 999, 0, 0),
      new THREE.Vector4(999, 999, 0, 0)
    ]},
    uCardRotations: { value: [0, 0, 0, 0] }
  },
  vertexShader: `
    uniform float uTime;
    uniform vec3 uMouse;
    uniform vec2 uMouseVel;
    uniform float uMouseStrength;
    uniform vec4 uCards[4];
    uniform float uCardRotations[4];
    attribute vec3 aOffset;
    attribute float aScale;
    attribute float aRot;
    varying vec2 vUv;
    varying float vCardCover;
    varying float vRand;
    void main() {
      vUv = uv;
      vRand = fract(aRot * 7.13 + aScale * 3.71);

      // Hide daisies under a card or within a small margin around it
      float cardCover = 0.0;
      for (int i = 0; i < 4; i++) {
        vec4 c = uCards[i];
        vec2 delta = aOffset.xz - c.xy;
        float ang = uCardRotations[i];
        float cs = cos(-ang), sn = sin(-ang);
        vec2 local = vec2(delta.x * cs - delta.y * sn, delta.x * sn + delta.y * cs);
        vec2 absLocal = abs(local);
        vec2 over = max(absLocal - vec2(c.z, c.w), vec2(0.0));
        cardCover = max(cardCover, 1.0 - step(0.15, length(over)));
      }
      vCardCover = cardCover;

      vec3 pos = position * aScale * (1.0 - cardCover);
      float c = cos(aRot), s = sin(aRot);
      pos.xz = mat2(c, -s, s, c) * pos.xz;
      vec3 worldPos = pos + aOffset;

      // Gentle sway
      float sway = sin(uTime * 1.2 + aOffset.x * 0.4 + aOffset.z * 0.3) * 0.02;
      worldPos.x += sway;
      worldPos.z += sway * 0.5;

      // Cursor as gentle wind — daisies lean slightly, no warp
      vec2 toMouse = worldPos.xz - uMouse.xz;
      float dist = length(toMouse);
      float velMag = length(uMouseVel);
      float velGate = smoothstep(0.0, 0.3, velMag);
      float falloff = exp(-dist * dist * 1.5);
      float windInfluence = falloff * uMouseStrength * velGate;
      vec2 windPush = uMouseVel * 0.04;
      worldPos.x += windPush.x * windInfluence;
      worldPos.z += windPush.y * windInfluence;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(worldPos, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying float vCardCover;
    varying float vRand;

    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

    // One petal layer: returns alpha and writes shaded color.
    // ringRot offsets the whole ring; lenScale shrinks the back layer.
    float petalLayer(vec2 p, float ringRot, float lenScale, float seed, out vec3 col, out float uOut) {
      float r = length(p);
      float angle = atan(p.y, p.x) + ringRot;
      float petalCount = 13.0;
      float aNorm = fract((angle + 3.14159265) / 6.2831853);
      float petalIdx = floor(aNorm * petalCount);
      float petalFrac = fract(aNorm * petalCount) - 0.5;

      // Per-petal length and tilt so the ring isn't mechanical
      float pr = hash(vec2(petalIdx, seed * 43.7));
      float petalLen = (0.40 + pr * 0.07) * lenScale;
      float baseR = 0.095;

      float u = clamp((r - baseR) / (petalLen - baseR), 0.0, 1.0);
      float vAcross = petalFrac / 0.36;

      // Rounded oval profile, widest mid-petal, with a tiny tip notch
      float widthProfile = sqrt(max(1.0 - pow(abs(2.0 * u - 1.0), 2.3), 0.0));
      widthProfile = max(widthProfile, smoothstep(0.0, 0.06, u) * 0.25);
      float notch = 1.0 - 0.16 * exp(-vAcross * vAcross * 36.0) * smoothstep(0.82, 1.0, u);
      float edge = widthProfile * notch - abs(vAcross);
      float alpha = smoothstep(0.0, 0.10, edge)
                  * smoothstep(baseR - 0.015, baseR + 0.01, r)
                  * (1.0 - smoothstep(petalLen - 0.02, petalLen, r));

      // Petal shading: shadow at the base, brighter sunlit tips,
      // a soft crease vein down the middle, gentle cupping at the edges
      vec3 c = vec3(0.99, 0.975, 0.94);
      c -= vec3(0.10, 0.085, 0.05) * exp(-u * 4.5);
      c *= 0.90 + 0.10 * u;
      c *= 1.0 - 0.09 * exp(-vAcross * vAcross * 26.0);
      c *= 1.0 - smoothstep(0.65, 1.0, abs(vAcross)) * 0.10;
      // Blush of pink at the tips on some flowers
      c = mix(c, vec3(0.97, 0.86, 0.88), smoothstep(0.8, 1.0, u) * seed * 0.4);
      col = c;
      uOut = u;
      return alpha;
    }

    void main() {
      if (vCardCover > 0.5) discard;
      vec2 p = vUv - 0.5;
      float r = length(p);

      vec3 col = vec3(0.0);
      float alpha = 0.0;

      // Back petal ring — rotated half a petal, shorter and in shadow
      vec3 backCol; float bu;
      float backA = petalLayer(p, 0.2417, 0.9, vRand + 0.31, backCol, bu);
      backCol *= 0.74; // tucked beneath, catching less light
      col = backCol;
      alpha = backA;

      // Front petal ring
      vec3 frontCol; float fu;
      float frontA = petalLayer(p, 0.0, 1.0, vRand, frontCol, fu);
      col = mix(col, frontCol, frontA);
      alpha = max(alpha, frontA);

      // ===== Center: domed golden disc of tiny florets =====
      float cR = 0.115;
      float centerAlpha = smoothstep(cR + 0.008, cR - 0.02, r);
      // Dome shading — light favors the upper-left
      vec2 lp = p - vec2(-0.022, 0.026);
      float dome = 1.0 - smoothstep(0.0, cR * 1.15, length(lp));
      vec3 centerCol = mix(vec3(0.80, 0.50, 0.09), vec3(1.0, 0.85, 0.28), dome);
      // Florets at two scales — fine speckle plus chunkier buds
      float f1 = hash(floor(p * 72.0) + vRand * 17.0);
      float f2 = hash(floor(p * 40.0) + vRand * 9.0 + 7.0);
      centerCol *= 0.86 + 0.20 * f1;
      centerCol += vec3(0.12, 0.09, 0.0) * step(0.8, f2) * (0.4 + dome * 0.6);
      // Shadowed ring where petals tuck under the disc
      centerCol *= 1.0 - smoothstep(cR - 0.04, cR, r) * 0.4;
      // Petals darken slightly right where they meet the center
      col *= 1.0 - smoothstep(cR + 0.06, cR, r) * 0.18 * (1.0 - centerAlpha);

      col = mix(col, centerCol, centerAlpha);
      alpha = max(alpha, centerAlpha);

      if (alpha < 0.04) discard;
      gl_FragColor = vec4(col, alpha);
    }
  `
});

          // (paper subtly responds to the sun direction)
          float diag = dot(normalize(vec2(0.7, -0.7)), centered);
          col *= 1.0 + diag * 0.04;

          // Fine paper grain — matte print texture
          float grain = noise(vUv * 320.0);
          col *= 0.98 + grain * 0.03;

          // Soft inner border darkening (matte card edge has a slight rim shadow)
          float edgeDist = max(abs(centered.x), abs(centered.y));
          float edge = smoothstep(0.47, 0.5, edgeDist);
          col = mix(col, col * 0.88, edge);

          // Tiny bright rim highlight right at the perimeter (paper catching light)
          float rim = smoothstep(0.495, 0.5, edgeDist);
          col = mix(col, col * 1.2 + vec3(0.1, 0.08, 0.05), rim * 0.5);

          // Minimal fog
          float depth = gl_FragCoord.z / gl_FragCoord.w;
          float fog = 1.0 - exp(-uFogDensity * depth * 0.2);
          col = mix(col, uFogColor, fog * 0.15);

          gl_FragColor = vec4(col, 1.0);
        }
      `
    });

    const card = new THREE.Mesh(geo, mat);
    const restY = terrainHeight(pos.x, pos.z) + 0.42;
    card.position.set(pos.x, restY, pos.z);
    card.rotation.y = pos.rot;
    card.userData.isCard = true;
    card.userData.shaderMat = mat;
    card.userData.cardIndex = i;
    card.userData.restPos = new THREE.Vector3(pos.x, restY, pos.z);
    card.userData.restRotY = pos.rot;
    card.userData.product = cardProducts[i];
    scene.add(card);
    cardMeshes.push(card);

    // ===== Soft contact shadow underneath the card =====
    // Just a gentle darkening on the grass beneath each card —
    // suggests the card is resting on it, no harsh light beam.
    const shadowGeo = new THREE.PlaneGeometry(cardW * 1.4, cardH * 1.4);
    shadowGeo.rotateX(-Math.PI / 2);
    const shadowMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        void main() {
          vec2 p = vUv - 0.5;
          // Rounded rectangular shadow that softens away from the card
          float d = max(abs(p.x) / 0.35, abs(p.y) / 0.35);
          float a = smoothstep(1.0, 0.6, d) * 0.35;
          gl_FragColor = vec4(0.05, 0.08, 0.04, a);
        }
      `
    });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.position.set(pos.x, terrainHeight(pos.x, pos.z) + 0.02, pos.z);
    shadow.rotation.y = pos.rot;
    scene.add(shadow);
  });
});

// ---------- Volumetric god rays (sun shafts through mist) ----------
const RAY_COUNT = 24;
const rayGroup = new THREE.Group();
for (let i = 0; i < RAY_COUNT; i++) {
  const width = 0.4 + Math.random() * 1.2;
  const height = 10;
  const geo = new THREE.PlaneGeometry(width, height);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms: {
      uTime:    { value: 0 },
      uSeed:    { value: Math.random() * 100 },
      uOpacity: { value: 0.04 + Math.random() * 0.06 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      uniform float uSeed;
      uniform float uOpacity;
      void main() {
        // Soft falloff on all edges, hottest near top (sun source)
        float horiz = smoothstep(0.0, 0.45, vUv.x) * smoothstep(1.0, 0.55, vUv.x);
        float vert  = smoothstep(0.0, 0.2, vUv.y) * smoothstep(1.0, 0.5, vUv.y);
        float flick = 0.85 + 0.15 * sin(uTime * 0.7 + uSeed);
        vec3 col = vec3(1.0, 0.78, 0.42); // warm golden shaft
        gl_FragColor = vec4(col, horiz * vert * uOpacity * flick);
      }
    `
  });
  const plane = new THREE.Mesh(geo, mat);
  // Position high above ground, scattered across the field
  plane.position.set(
    (Math.random() - 0.5) * 18,
    4 + Math.random() * 2,
    (Math.random() - 0.5) * 14 - 2
  );
  // Tilt to angle down (sun coming from upper right)
  plane.rotation.z = 0.35 + (Math.random() - 0.5) * 0.2;
  plane.rotation.y = (Math.random() - 0.5) * 0.4;
  plane.userData = {
    drift: 0.03 + Math.random() * 0.06,
    baseX: plane.position.x,
    seed: Math.random() * 10
  };
  rayGroup.add(plane);
}
scene.add(rayGroup);

// ---------- Ambient floating dust motes ----------
const DUST_COUNT = 300;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(DUST_COUNT * 3);
const dustSeed = new Float32Array(DUST_COUNT);
for (let i = 0; i < DUST_COUNT; i++) {
  dustPos[i*3+0] = (Math.random() - 0.5) * 16;
  dustPos[i*3+1] = 0.3 + Math.random() * 5;
  dustPos[i*3+2] = (Math.random() - 0.5) * 14 - 2;
  dustSeed[i] = Math.random() * 100;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
dustGeo.setAttribute('aSeed', new THREE.BufferAttribute(dustSeed, 1));

const dustMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 },
    uPixelRatio: { value: renderer.getPixelRatio() }
  },
  vertexShader: `
    attribute float aSeed;
    uniform float uTime;
    uniform float uPixelRatio;
    varying float vSeed;
    void main() {
      vSeed = aSeed;
      vec3 p = position;
      // Slow lazy drift
      p.x += sin(uTime * 0.2 + aSeed) * 0.4;
      p.y += sin(uTime * 0.15 + aSeed * 1.3) * 0.2;
      p.z += cos(uTime * 0.18 + aSeed * 0.7) * 0.3;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_PointSize = (3.0 + sin(aSeed) * 2.0) * uPixelRatio * (5.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying float vSeed;
    void main() {
      float d = distance(gl_PointCoord, vec2(0.5));
      float a = smoothstep(0.5, 0.0, d);
      // Twinkle
      float twinkle = 0.5 + 0.5 * sin(vSeed * 10.0);
      gl_FragColor = vec4(vec3(1.0, 0.85, 0.55), a * 0.5 * twinkle);
    }
  `
});
scene.add(new THREE.Points(dustGeo, dustMat));

// ---------- Mouse → world ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-2, -2);
const groundMesh = scene.children.find(c => c.geometry === groundGeo);
const mouseWorld = new THREE.Vector3(999, 0, 999);
const mouseVelocity = new THREE.Vector2(0, 0);
const prevMouseWorld = new THREE.Vector3();
let targetStrength = 0;
let lastMouseWorld = new THREE.Vector3();
let mouseActive = false;

addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  targetStrength = 1.0;
  mouseActive = true;
  document.getElementById('cursor').style.left = e.clientX + 'px';
  document.getElementById('cursor').style.top = e.clientY + 'px';
});
addEventListener('pointerleave', () => { targetStrength = 0; mouseActive = false; });

// ===== Card click → product detail =====
let activeCard = null;       // The card currently lifted into view
let displayCard = null;      // Persists through lift-down so we know which card to render sharp
let cardAnimT = 0;           // 0 = at rest, 1 = fully lifted
const ANIM_DURATION = 0.7;   // seconds for lift animation

addEventListener('pointerdown', (e) => {
  // Ignore clicks on the product panel itself
  if (e.target.closest('#product-panel')) return;

  // Update pointer coords from this event (essential for mobile taps,
  // since pointermove may not fire before pointerdown on touch devices)
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;

  // Raycast against cards first
  if (cardMeshes.length > 0) {
    raycaster.setFromCamera(pointer, camera);
    const cardHits = raycaster.intersectObjects(cardMeshes);
    if (cardHits.length > 0 && !activeCard) {
      const clickedCard = cardHits[0].object;
      activeCard = clickedCard;
      displayCard = clickedCard;
      // Move active card to its own render layer so we can blur the rest of the scene
      // and draw the card sharp on top.
      clickedCard.layers.set(1);
      cardAnimT = 0;
      showProductPanel(clickedCard.userData.product);
      return;
    }
  }

  // Otherwise, normal ripple — also need mouseWorld to be current
  raycaster.setFromCamera(pointer, camera);
  const groundHits = raycaster.intersectObject(groundMesh);
  if (groundHits.length > 0) {
    mouseWorld.copy(groundHits[0].point);
    grassMat.uniforms.uRipplePos.value.copy(mouseWorld);
    grassMat.uniforms.uRippleTime.value = 0;
  }
});

// ===== Product panel logic =====
const panel = document.getElementById('product-panel');
const addToCartBtn = document.getElementById('add-to-cart');

function showProductPanel(product) {
  document.getElementById('product-title').textContent = product.title;
  document.getElementById('product-subtitle').textContent = product.subtitle;
  document.getElementById('product-description').textContent = product.description;
  document.getElementById('product-paper').textContent = product.paper;
  document.getElementById('product-size').textContent = product.size;
  document.getElementById('product-edition').textContent = product.edition;
  document.getElementById('product-price').textContent = product.price;
  addToCartBtn.textContent = 'Add to cart';
  addToCartBtn.classList.remove('added');
  // Delay panel slide so card starts lifting first
  setTimeout(() => panel.classList.add('active'), 250);
}

function hideProductPanel() {
  panel.classList.remove('active');
  activeCard = null;
  cardAnimT = 0;
}

document.getElementById('product-close').addEventListener('click', hideProductPanel);

addToCartBtn.addEventListener('click', () => {
  addToCartBtn.textContent = '✓  Added to cart';
  addToCartBtn.classList.add('added');
});

// ESC closes panel
addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideProductPanel();
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  resizeRTs();
});

// ---------- Animate ----------
const clock = new THREE.Clock();
let lastT = 0;

function animate() {
  const t = clock.getElapsedTime();
  const dt = Math.min(t - lastT, 0.05);
  lastT = t;

  grassMat.uniforms.uTime.value = t;
  groundMat.uniforms.uTime.value = t;
  waterMat.uniforms.uTime.value = t;
  grassMat.uniforms.uRippleTime.value += dt;
  daisyMat.uniforms.uTime.value = t;

  // Update card shaders with time
  scene.traverse((obj) => {
    if (obj.userData && obj.userData.isCard) {
      obj.userData.shaderMat.uniforms.uTime.value = t;
    }
  });

  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObject(groundMesh);
  if (hits.length > 0) mouseWorld.copy(hits[0].point);

  // Compute mouse velocity in world XZ (smoothed)
  const vx = (mouseWorld.x - prevMouseWorld.x) / Math.max(dt, 0.001);
  const vz = (mouseWorld.z - prevMouseWorld.z) / Math.max(dt, 0.001);
  mouseVelocity.x += (vx - mouseVelocity.x) * 0.25;
  mouseVelocity.y += (vz - mouseVelocity.y) * 0.25;
  prevMouseWorld.copy(mouseWorld);

  grassMat.uniforms.uMouse.value.copy(mouseWorld);
  grassMat.uniforms.uMouseVel.value.copy(mouseVelocity);
  daisyMat.uniforms.uMouse.value.copy(mouseWorld);
  daisyMat.uniforms.uMouseVel.value.copy(mouseVelocity);

  const cur = grassMat.uniforms.uMouseStrength.value;
  const next = cur + (targetStrength - cur) * 0.1;
  grassMat.uniforms.uMouseStrength.value = next;
  daisyMat.uniforms.uMouseStrength.value = next;

  if (mouseActive) {
    lastMouseWorld.copy(mouseWorld);
  }

  // Animate dust motes
  dustMat.uniforms.uTime.value = t;

  // Animate god rays — gentle drift + shimmer
  rayGroup.children.forEach((ray, i) => {
    ray.material.uniforms.uTime.value = t;
    ray.position.x = ray.userData.baseX + Math.sin(t * ray.userData.drift + ray.userData.seed) * 0.5;
  });

  // ===== Card lift animation =====
  // Smoothly tween toward target state (0 = rest, 1 = lifted)
  const target = activeCard ? 1 : 0;
  cardAnimT += (target - cardAnimT) * Math.min(dt / ANIM_DURATION * 4, 0.2);

  cardMeshes.forEach((card) => {
    const rest = card.userData.restPos;
    const restRotY = card.userData.restRotY;

    if (card === activeCard) {
      // Eased animation factor
      const e = cardAnimT;
      const ease = e < 0.5 ? 2 * e * e : 1 - Math.pow(-2 * e + 2, 2) / 2;

      // ===== Product-shot showcase: card hovers in front of camera, facing it =====
      const camPos = camera.position;
      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      const camRight = new THREE.Vector3();
      camRight.crossVectors(camDir, camera.up).normalize();
      const camUp = new THREE.Vector3();
      camUp.crossVectors(camRight, camDir).normalize();

      // Card hero pose — keep enough distance that the print fits cleanly in frame.
      // On desktop, offset left so the card sits in the empty area beside the side panel.
      const distance = isPortrait ? 4.8 : 4.2;
      const sideOffset = isPortrait ? 0 : -0.9;
      const verticalOffset = isPortrait ? 0.4 : 0.1;

      // Gentle idle motion — subtle float + slow turntable sway
      const bob = Math.sin(t * 1.1) * 0.04;
      const sway = Math.sin(t * 0.55) * 0.08; // radians, slow yaw

      const tx = camPos.x + camDir.x * distance + camRight.x * sideOffset;
      const ty = camPos.y + camDir.y * distance + camUp.y * verticalOffset + bob;
      const tz = camPos.z + camDir.z * distance + camRight.z * sideOffset;

      card.position.x = rest.x + (tx - rest.x) * ease;
      card.position.y = rest.y + (ty - rest.y) * ease;
      card.position.z = rest.z + (tz - rest.z) * ease;

      // Orient card to face the camera. Geometry was pre-rotated so the card's
      // face-normal is local +Y; build a quaternion that aims +Y at the camera.
      const toCam = new THREE.Vector3().subVectors(camPos, card.position).normalize();
      const faceQuat = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        toCam
      );
      // Add a small turntable sway around the world up axis for life
      const swayQuat = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 1, 0),
        sway * ease
      );
      const targetQuat = swayQuat.multiply(faceQuat);

      // Rest quaternion (flat on ground, original spawn yaw)
      const restQuat = new THREE.Quaternion().setFromEuler(
        new THREE.Euler(0, restRotY, 0)
      );

      // Slerp from rest pose into product-shot pose by ease factor
      card.quaternion.copy(restQuat).slerp(targetQuat, ease);

      // Scale up modestly — too large overflows the viewport
      const heroScale = 1.0 + 0.2 * ease;
      card.scale.set(heroScale, heroScale, heroScale);

      // Render this card on top so grass/daisies never poke through it
      card.renderOrder = 10;
      card.userData.shaderMat.depthTest = true;
    } else {
      // Other cards lerp back to rest
      card.position.lerp(rest, 0.15);
      const restQ = new THREE.Quaternion().setFromEuler(
        new THREE.Euler(0, restRotY, 0)
      );
      card.quaternion.slerp(restQ, 0.15);
      card.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15);
      card.renderOrder = 0;
    }
  });

  // Subtle camera drift
  camera.position.x = Math.sin(t * 0.04) * 0.15;
  camera.lookAt(0, 0, 0);

  // ===== Render: blur background when a card is in product-shot view =====
  // Lift-down tween: once cardAnimT collapses back to ~0, release the card
  // from its dedicated layer and exit the multi-pass path.
  if (!activeCard && displayCard && cardAnimT < 0.01) {
    displayCard.layers.set(0);
    displayCard = null;
  }

  if (displayCard && cardAnimT > 0.005) {
    const focus = cardAnimT; // 0..1 — drives blur radius, vignette, darkening

    // Pass 1 — render everything EXCEPT the active card into sceneRT
    camera.layers.set(0);
    renderer.setRenderTarget(sceneRT);
    renderer.clear();
    renderer.render(scene, camera);

    // Pass 2 — separable Gaussian blur, run two ping-pong iterations for a
    // wider effective kernel that's clearly visible but still preserves the
    // colors and shapes of the grass field underneath.
    const blurPx = 8.0 * focus;
    blurMat.uniforms.uRadius.value = blurPx;

    // First iteration: sceneRT -> blurRTa (horizontal) -> blurRTb (vertical)
    blurMat.uniforms.uTex.value = sceneRT.texture;
    blurMat.uniforms.uDir.value.set(1 / blurRTa.width, 0);
    renderer.setRenderTarget(blurRTa);
    renderer.clear();
    renderer.render(quadScene, quadCam);

    blurMat.uniforms.uTex.value = blurRTa.texture;
    blurMat.uniforms.uDir.value.set(0, 1 / blurRTa.height);
    renderer.setRenderTarget(blurRTb);
    renderer.clear();
    renderer.render(quadScene, quadCam);

    // Second iteration: blurRTb -> blurRTa (horizontal) -> blurRTb (vertical)
    blurMat.uniforms.uTex.value = blurRTb.texture;
    blurMat.uniforms.uDir.value.set(1 / blurRTa.width, 0);
    renderer.setRenderTarget(blurRTa);
    renderer.clear();
    renderer.render(quadScene, quadCam);

    blurMat.uniforms.uTex.value = blurRTa.texture;
    blurMat.uniforms.uDir.value.set(0, 1 / blurRTa.height);
    renderer.setRenderTarget(blurRTb);
    renderer.clear();
    renderer.render(quadScene, quadCam);

    // Pass 3 — composite blurred background to screen with vignette/darken
    compositeMat.uniforms.uTex.value = blurRTb.texture;
    compositeMat.uniforms.uFocus.value = focus;
    renderer.setRenderTarget(null);
    renderer.clear();
    renderer.render(compositeScene, quadCam);

    // Pass 4 — render the active card sharp on top of the composited blur.
    // Three.js draws scene.background as a fullscreen pass even when autoClear=false,
    // which would wipe out the blurred background we just composited. Null it out
    // for this pass, then restore.
    const savedBg = scene.background;
    scene.background = null;
    camera.layers.set(1);
    renderer.autoClear = false;
    renderer.clearDepth();
    renderer.render(scene, camera);
    renderer.autoClear = true;
    scene.background = savedBg;
    camera.layers.set(0);
  } else {
    renderer.setRenderTarget(null);
    renderer.render(scene, camera);
  }

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
